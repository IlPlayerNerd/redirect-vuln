<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Safe Redirect Demo</title>
</head>
<body>

<h2>Safe Redirect Page</h2>
<p>If a valid redirect URL is provided, you will be redirected.</p>

<script> 

  const params = new URLSearchParams(window.location.search);
  const redirectUrl = params.get("redirect");

  if (redirectUrl) {
    try {
      //const url = new URL(redirectUrl);
       
        window.location.href = redirectUrl; 
      } catch (e) {
      document.body.innerHTML += "<p style='color:red;'>redirectUrl.</p>";
      document.body.innerHTML += "<p style='color:red;'>Invalid URL format.</p>";
    }
  }
</script>

</body>

</html>
