<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Safe Redirect Demo</title>
</head>
<body>

<h2>Safe Redirect Page</h2>
<p>If a valid redirect URL is provided, you will be redirected.</p>

<script>
  const allowedDomains = [
    "example.com",
    "github.com",
    "google.com"
  ];

  const params = new URLSearchParams(window.location.search);
  const redirectUrl = params.get("redirect");

  if (redirectUrl) {
    try {
      const url = new URL(redirectUrl);
      
      if (allowedDomains.includes(url.hostname)) {
        window.location.href = redirectUrl;
      } else {
        document.body.innerHTML += "<p style='color:red;'>Invalid redirect domain.</p>";
      }
    } catch (e) {
      document.body.innerHTML += "<p style='color:red;'>Invalid URL format.</p>";
    }
  }
</script>

</body>
</html>
